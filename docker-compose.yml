# File: docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: jobportal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "5000:5000"
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:password123@postgres:5432/jobportal?schema=public
      - JWT_SECRET=super_secret_jwt_key_here_123!
      - JWT_REFRESH_SECRET=super_secret_refresh_jwt_key_here_123!
      - PORT=5000
    depends_on:
      - postgres
    command: sh -c "npx prisma migrate deploy && npm run dev"

volumes:
  pgdata: